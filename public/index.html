<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #222635;
      --border:     #2e3248;
      --accent:     #6c63ff;
      --accent-h:   #574fd6;
      --text:       #e2e4f0;
      --muted:      #737899;
      --success:    #34d399;
      --warning:    #fbbf24;
      --danger:     #f87171;
      --high:       #f87171;
      --medium:     #fbbf24;
      --low:        #34d399;
      --pending:    #737899;
      --in-progress:#6c63ff;
      --done:       #34d399;
      --radius:     10px;
      --shadow:     0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }


    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .app-header h1 span { color: var(--accent); }
    .header-badge {
      font-size: 0.72rem;
      background: var(--accent);
      color: #fff;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }


    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 0.6rem 0.85rem;
      font-size: 0.9rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--surface2); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; justify-content: center; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.78rem; border-radius: 6px; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: rgba(248,113,113,0.15); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
    .btn-danger:hover { background: rgba(248,113,113,0.25); }
    .btn-success { background: rgba(52,211,153,0.15); color: var(--success); border: 1px solid rgba(52,211,153,0.3); }
    .btn-success:hover { background: rgba(52,211,153,0.25); }


    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      background: var(--surface2);
      padding: 5px;
      border-radius: 9px;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 0.5rem;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }


    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    #task-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .task-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      transition: border-color 0.2s;
    }
    .task-card:hover { border-color: var(--accent); }

    .task-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .task-title {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .task-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-high     { background: rgba(248,113,113,0.15); color: var(--high); }
    .badge-medium   { background: rgba(251,191,36,0.15);  color: var(--medium); }
    .badge-low      { background: rgba(52,211,153,0.15);  color: var(--low); }
    .badge-pending  { background: rgba(115,120,153,0.2);  color: var(--pending); }
    .badge-in_progress { background: rgba(108,99,255,0.15); color: var(--in-progress); }
    .badge-done     { background: rgba(52,211,153,0.15);  color: var(--done); }

    .due-date {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .task-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.6rem; }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .report-cell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem;
      text-align: center;
    }
    .report-cell .count { font-size: 1.6rem; font-weight: 700; }
    .report-cell .label { font-size: 0.7rem; color: var(--muted); font-weight: 600; margin-top: 2px; }
    .report-header {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
      margin-bottom: 0;
    }
    .report-header-cell {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      padding: 0.4rem;
    }
    .report-row-label {
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 340px;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.8rem 1rem;
      font-size: 0.85rem;
      box-shadow: var(--shadow);
      animation: slideIn 0.25s ease;
      border-left: 3px solid var(--accent);
    }
    .toast.success { border-left-color: var(--success); }
    .toast.error   { border-left-color: var(--danger); }
    @keyframes slideIn {
      from { transform: translateX(30px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.9rem; }


    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .config-bar {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.8rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .config-bar label { font-size: 0.8rem; color: var(--muted); font-weight: 600; white-space: nowrap; margin: 0; }
    .config-bar input { flex: 1; min-width: 200px; }
    .config-bar .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success); flex-shrink: 0;
    }
    hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  </style>
</head>
<body>


<header class="app-header">
  <h1>Task Manager</h1>
</header>

<div class="container">
  <!-- API base URL configuration -->
  <div class="config-bar">
    <div class="status-dot" id="status-dot"></div>
    <label for="base-url">API Base URL:</label>
    <input type="text" id="base-url" value="http://localhost:8000/api" placeholder="http://localhost:8000/api" />
    <button class="btn btn-ghost btn-sm" onclick="loadTasks()">Connect</button>
  </div>

  <div class="grid">
    <aside>
      <!-- Tabs for creating a new tab and reports -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('create', this)">New Task</button>
        <button class="tab-btn" onclick="switchTab('report', this)">Report</button>
      </div>

      <!-- create task -->
      <div class="tab-content active" id="tab-create">
        <div class="card">
          <p class="card-title">Create Task</p>
          <div class="form-group">
            <label for="f-title">Task Title *</label>
            <input type="text" id="f-title" placeholder="e.g. Fix login bug" maxlength="255" />
          </div>
          <div class="form-group">
            <label for="f-due">Due Date *</label>
            <input type="date" id="f-due" />
          </div>
          <div class="form-group">
            <label for="f-priority">Priority *</label>
            <select id="f-priority">
              <option value="">-- Select priority --</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <button class="btn btn-primary" id="create-btn" onclick="createTask()">
            Create Task
          </button>
        </div>
      </div>

      <!-- report -->
      <div class="tab-content" id="tab-report">
        <div class="card">
          <p class="card-title">Daily Report</p>
          <div class="form-group">
            <label for="r-date">Select Date</label>
            <input type="date" id="r-date" />
          </div>
          <button class="btn btn-primary" onclick="fetchReport()">Generate Report</button>

          <div id="report-output" style="margin-top:1.2rem; display:none;">
            <hr />
            <p style="font-size:0.78rem; color:var(--muted); margin-bottom:0.6rem;" id="report-date-label"></p>
            <div class="report-header">
              <div class="report-header-cell">Pending</div>
              <div class="report-header-cell">In Progress</div>
              <div class="report-header-cell">Done</div>

            <div class="report-row-label" style="margin-top:0.8rem;">
              <span class="badge badge-high">High</span>
            </div>
            <div class="report-grid" id="r-high"></div>

            <div class="report-row-label" style="margin-top:0.8rem;">
              <span class="badge badge-medium">Medium</span>
            </div>
            <div class="report-grid" id="r-medium"></div>

            <div class="report-row-label" style="margin-top:0.8rem;">
              <span class="badge badge-low">Low</span>
            </div>
            <div class="report-grid" id="r-low"></div>
          </div>
        </div>
      </div>

    </aside>


    <main>
      <div class="card">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
          <p class="card-title" style="margin:0;">Tasks <span id="task-count" style="color:var(--accent)"></span></p>
          <button class="btn btn-ghost btn-sm" onclick="loadTasks()">Refresh</button>
        </div>

        <div class="filters">
          <button class="filter-btn active" onclick="applyFilter('all', this)">All</button>
          <button class="filter-btn" onclick="applyFilter('pending', this)">Pending</button>
          <button class="filter-btn" onclick="applyFilter('in_progress', this)">In Progress</button>
          <button class="filter-btn" onclick="applyFilter('done', this)">Done</button>
        </div>

        <div id="task-list">
          <div class="empty-state">
            <p>Enter the API URL above and click connect to load tasks.</p>
          </div>
        </div>
      </div>
    </main>

  </div>
</div>

<div id="toast-container"></div>


<script>

  const getBaseUrl = () => document.getElementById('base-url').value.replace(/\/$/, '');


  const todayStr = new Date().toISOString().split('T')[0];
  document.getElementById('f-due').min = todayStr;
  document.getElementById('f-due').value = todayStr;
  document.getElementById('r-date').value = todayStr;

  async function api(method, path, body = null) {
    const url = getBaseUrl() + path;
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);

    const res = await fetch(url, opts);
    const data = await res.json();
    return { ok: res.ok, status: res.status, data };
  }


  let currentFilter = 'all';

  async function loadTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = '<div style="text-align:center;padding:2rem;"><div class="spinner"></div></div>';

    try {
      const path = currentFilter === 'all' ? '/tasks' : `/tasks?status=${currentFilter}`;
      const { ok, data } = await api('GET', path);

      document.getElementById('status-dot').style.background = ok ? 'var(--success)' : 'var(--danger)';

      if (!ok) {
        list.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${data.message || 'Could not reach API.'}</p></div>`;
        return;
      }

      const tasks = data.data || [];
      document.getElementById('task-count').textContent = tasks.length ? `(${tasks.length})` : '';

      if (!tasks.length) {
        list.innerHTML = `<div class="empty-state"><p>${data.message || 'No tasks found.'}</p></div>`;
        return;
      }

      list.innerHTML = tasks.map(renderTask).join('');

    } catch (err) {
      document.getElementById('status-dot').style.background = 'var(--danger)';
      list.innerHTML = `<div class="empty-state"><p>Cannot connect. Check your API URL and make sure Laravel is running.</p></div>`;
    }
  }


  function renderTask(task) {
    const statusMap = {
      pending: { label: 'Pending', next: 'in_progress', nextLabel: 'Start' },
      in_progress: { label: 'In Progress', next: 'done', nextLabel: 'Complete' },
      done: { label: 'Done', next: null, nextLabel: null },
    };
    const s = statusMap[task.status];
    const advanceBtn = s.next
      ? `<button class="btn btn-sm btn-success" onclick="advanceStatus(${task.id}, '${s.next}')">${s.nextLabel}</button>`
      : '';
    const deleteBtn = task.status === 'done'
      ? `<button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id}, '${escHtml(task.title)}')">🗑 Delete</button>`
      : '';

    return `
      <div class="task-card" id="task-card-${task.id}">
        <div class="task-header">
          <span class="task-title">${escHtml(task.title)}</span>
          <span class="badge badge-${task.priority}">${task.priority}</span>
        </div>
        <div class="task-meta">
          <span class="badge badge-${task.status}">${s.label}</span>
          <span class="due-date"> Due: ${task.due_date}</span>
        </div>
        <div class="task-actions">
          ${advanceBtn}
          ${deleteBtn}
        </div>
      </div>`;
  }


  async function createTask() {
    const title    = document.getElementById('f-title').value.trim();
    const due_date = document.getElementById('f-due').value;
    const priority = document.getElementById('f-priority').value;

    if (!title || !due_date || !priority) {
      showToast('Please fill in all fields.', 'error');
      return;
    }

    const btn = document.getElementById('create-btn');
    btn.innerHTML = '<span class="spinner"></span> Creating...';
    btn.disabled = true;

    try {
      const { ok, data } = await api('POST', '/tasks', { title, due_date, priority });

      if (ok) {
        showToast(`Task "${title}" created!`, 'success');
        document.getElementById('f-title').value = '';
        loadTasks();
      } else {
        const errMsg = data.errors
          ? Object.values(data.errors).flat().join(' ')
          : (data.message || 'Failed to create task.');
        showToast(errMsg, 'error');
      }
    } catch {
      showToast('Could not reach the API.', 'error');
    }

    btn.innerHTML = 'Create Task';
    btn.disabled = false;
  }

  async function advanceStatus(id, newStatus) {
    const { ok, data } = await api('PATCH', `/tasks/${id}/status`, { status: newStatus });

    if (ok) {
      showToast(`Status updated to "${newStatus}".`, 'success');
      loadTasks();
    } else {
      showToast((data.message || 'Status update failed.'), 'error');
    }
  }

  async function deleteTask(id, title) {
    if (!confirm(`Delete task "${title}"? This cannot be undone.`)) return;

    const { ok, data } = await api('DELETE', `/tasks/${id}`);

    if (ok) {
      showToast(`Task "${title}" deleted.`, 'success');
      loadTasks();
    } else {
      showToast((data.message || 'Delete failed.'), 'error');
    }
  }

  async function fetchReport() {
    const date = document.getElementById('r-date').value;
    if (!date) { showToast('Please select a date.', 'error'); return; }

    const { ok, data } = await api('GET', `/tasks/report?date=${date}`);

    if (!ok) {
      showToast((data.message || 'Report failed.'), 'error');
      return;
    }

    document.getElementById('report-date-label').textContent = `Report for ${date}`;
    document.getElementById('report-output').style.display = 'block';

    const statuses = ['pending', 'in_progress', 'done'];
    const colours  = { pending: 'var(--muted)', in_progress: 'var(--in-progress)', done: 'var(--done)' };

    ['high', 'medium', 'low'].forEach(p => {
      document.getElementById(`r-${p}`).innerHTML = statuses.map(s => `
        <div class="report-cell">
          <div class="count" style="color:${colours[s]}">${data.summary[p][s]}</div>
          <div class="label">${s.replace('_', ' ')}</div>
        </div>`).join('');
    });
  }

  function applyFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTasks();
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
  }

  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }
</script>
</body>
</html>
